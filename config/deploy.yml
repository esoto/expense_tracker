# Name of your application. Used to uniquely configure containers.
service: expense-tracker

# Name of the container image.
image: esoto/expense-tracker

# Deploy to these servers.
servers:
  web:
    - 178.104.88.183

# SSL via Let's Encrypt + kamal-proxy
proxy:
  ssl: true
  host: expense-tracker.estebansoto.dev
  app_port: 3000
  # kamal-proxy polls the Rails /up endpoint (see config/routes.rb) before
  # cutting traffic to a new container. Without this, a broken boot would
  # silently serve errors to users (deploy-blocker B3, PER-493).
  healthcheck:
    path: /up
    interval: 10
    timeout: 5

# Grace period after health check passes before the old container is retired.
# Orchestrator#warm_caches (app/services/categorization/orchestrator.rb:106)
# runs on boot and can take several seconds — this avoids serving first
# requests against an unwarmed app.
readiness_delay: 15

# GitHub Container Registry
registry:
  server: ghcr.io
  username: esoto
  password:
    - KAMAL_REGISTRY_PASSWORD

# Environment variables injected into containers
env:
  secret:
    - RAILS_MASTER_KEY
    - SECRET_KEY_BASE
    - POSTGRES_PASSWORD
    - ADMIN_EMAIL
    - ADMIN_PASSWORD
    # Required for Categorization::Strategies::LlmStrategy (PR #421/#433).
    # Without this the strategy 401s on every call and the circuit-breaker
    # silently degrades to pattern-only categorization (PER-548).
    - ANTHROPIC_API_KEY
    # Sentry APM/error-tracking DSN (PER-526). Without this the gem stays
    # inert (no events sent). Store in 1Password:
    #   op://Personal Brand/Expense Tracker/SENTRY_DSN
    # and append to .kamal/secrets before deploying.
    - SENTRY_DSN
  clear:
    RAILS_ENV: production
    POSTGRES_USER: expense_tracker
    POSTGRES_HOST: personal-blog-db
    POSTGRES_PORT: "5432"
    # Primary DB connection pool per process. Math and rationale are
    # documented in config/database.yml's production.primary block.
    # personal-blog-db is shared with another app, so stay conservative
    # until `SHOW max_connections;` is verified on the host (PER-494).
    DB_POOL: "10"
    # Controls Puma web threads AND the queue/cache/cable DB pool sizes
    # (inherited from database.yml's default). Solid Queue's critical
    # worker needs HIGH_PRIORITY_THREADS(5) + dispatcher + supervisor = 7
    # connections from the queue pool — first deploy crashed with
    # "Solid Queue is configured to use 7 threads but the database
    # connection pool is 6".
    RAILS_MAX_THREADS: "8"
    # Run Solid Queue inside Puma (single server setup)
    SOLID_QUEUE_IN_PUMA: true
    # Host for DNS rebinding protection
    RAILS_HOST: expense-tracker.estebansoto.dev
    # Personal Category Management rollout kill-switch (PR 10/10).
    # "true" → open to all users. Unset / any other value → admins only.
    # Toggle by editing here and re-deploying; effect is immediate on
    # restart. No migration needed to roll back.
    PERSONAL_CATEGORIES_OPEN_TO_ALL: "false"

# Useful aliases
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent storage for Active Storage and Solid Queue/Cache/Cable
volumes:
  - "expense-tracker-storage:/rails/storage"

# Bridge assets between versions
asset_path: /rails/public/assets

# Build for amd64 (Hetzner server architecture)
builder:
  arch: amd64

# Use deploy user instead of root
ssh:
  user: deploy
